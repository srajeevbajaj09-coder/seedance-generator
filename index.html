<!DOCTYPE html>
<html>
<head>
<title>AI Image-to-Image Generator</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e1e1e;
padding:25px;
border-radius:10px;
}

textarea{
width:100%;
height:90px;
padding:10px;
border-radius:6px;
margin-top:10px;
}

input[type="file"]{
margin-top:10px;
}

button{
padding:12px 20px;
margin-top:15px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
}

button:hover{
background:#45a049;
}

img{
max-width:100%;
margin-top:20px;
border-radius:10px;
}

.status{
margin-top:15px;
padding:10px;
border-radius:6px;
}

.loading{
background:#333;
}

.error{
background:#5c1a1a;
}

.success{
background:#1a5c2e;
}
</style>

</head>

<body>

<div class="container">

<h2>Image → Image AI Generator</h2>

<p>Upload an image and describe the changes.</p>

<input type="file" id="imageInput" accept="image/*">

<textarea id="promptInput" placeholder="Example: keep same person and pose, cinematic lighting, ultra realistic"></textarea>

<br>

<button onclick="generateImage()">Generate Image</button>

<div id="status" class="status"></div>

<div id="output"></div>

</div>

<script src="https://js.puter.com/v2/"></script>

<script>

async function generateImage(){

const imageFile=document.getElementById("imageInput").files[0];
const prompt=document.getElementById("promptInput").value;

const status=document.getElementById("status");
const output=document.getElementById("output");

if(!imageFile){
alert("Please upload an image first");
return;
}

if(!prompt){
alert("Please enter a prompt");
return;
}

status.className="status loading";
status.innerHTML="Generating image... please wait";

output.innerHTML="";

const reader=new FileReader();

const imageDataUrl = await new Promise(resolve=>{
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(imageFile);
});

try{

const result = await puter.ai.txt2img(prompt,{
model:"togetherai:black-forest-labs/flux.1-kontext-dev",
input_reference:imageDataUrl,
size:"1024x1024"
});

console.log(result);

let imageData=null;

if(typeof result==="string"){
imageData=result;
}
else if(result.image){
imageData=result.image;
}
else if(result.images){
imageData=result.images[0];
}
else if(result.data && result.data[0].b64_json){
imageData="data:image/png;base64,"+result.data[0].b64_json;
}

if(!imageData){
throw new Error("No image returned from API");
}

const img=document.createElement("img");
img.src=imageData;

output.appendChild(img);

const download=document.createElement("a");
download.href=imageData;
download.download="generated-image.png";
download.innerHTML="<br>Download Image";

output.appendChild(download);

status.className="status success";
status.innerHTML="Image generated successfully";

}catch(error){

console.error(error);

status.className="status error";
status.innerHTML="Error: "+error.message;

}

}

</script>

</body>
</html>
