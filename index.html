<!DOCTYPE html>
<html>
<head>
<title>Seedance Image Generator</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:700px;
background:white;
padding:20px;
border-radius:10px;
margin:auto;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

img{
max-width:100%;
margin-top:20px;
border-radius:10px;
}

.status{
padding:10px;
margin-top:10px;
border-radius:5px;
}

.loading{
background:#fff3cd;
border-left:4px solid orange;
}

.success{
background:#d4edda;
border-left:4px solid green;
}

.error{
background:#f8d7da;
border-left:4px solid red;
}
</style>

</head>

<body>

<div class="container">

<h2>Seedance Image Generator</h2>

<h3>Upload Image</h3>
<input type="file" id="imageInput" accept="image/*">

<br>
<img id="preview" style="display:none;max-width:300px;">

<h3>Prompt</h3>
<textarea id="promptInput" rows="4" cols="60"
placeholder="romantic cinematic couple portrait, soft lighting"></textarea>

<br>

<button id="generateBtn">Generate Image</button>

<div id="status" class="status"></div>

<div id="output"></div>

</div>

<script src="https://js.puter.com/v2/"></script>

<script>

document.addEventListener("DOMContentLoaded", function() {

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const button = document.getElementById("generateBtn");

imageInput.addEventListener("change", function(e){

const reader = new FileReader();

reader.onload = function(e){
preview.src = e.target.result;
preview.style.display = "block";
}

reader.readAsDataURL(e.target.files[0]);

});

button.addEventListener("click", generateImage);

});

async function generateImage(){

const imageFile = document.getElementById("imageInput").files[0];
const prompt = document.getElementById("promptInput").value;

const status = document.getElementById("status");
const output = document.getElementById("output");

if(!imageFile){
alert("Upload image first");
return;
}

if(!prompt){
alert("Enter prompt");
return;
}

status.className="status loading";
status.innerHTML="Generating image...";

output.innerHTML="";

try{

const reader = new FileReader();

const imageDataUrl = await new Promise(resolve=>{
reader.onload = () => resolve(reader.result);
reader.readAsDataURL(imageFile);
});

const options = {
model: "togetherai:bytedance-seed/seedream-4.0",
input_reference: imageDataUrl,
size: "1024x1024"
};

const result = await puter.ai.txt2img(prompt, options);

console.log("API response:", result);

const img = document.createElement("img");

let imageData = null;

// handle base64 images
if (typeof result === "string" && result.startsWith("data:image")) {
    imageData = result;
}
else if (result?.image && result.image.startsWith("data:image")) {
    imageData = result.image;
}
else if (result?.images && result.images.length > 0) {
    imageData = result.images[0];
}
else if (result?.data && result.data.length > 0) {
    imageData = result.data[0].b64_json
        ? "data:image/png;base64," + result.data[0].b64_json
        : result.data[0].url;
}

if (!imageData) {
    console.error(result);
    throw new Error("No image returned from API");
}

img.src = imageData;
img.style.maxWidth = "100%";

output.appendChild(img);

status.className="status success";
status.innerHTML="Image generated successfully";

}

catch(error){

status.className="status error";
status.innerHTML="Error: " + error.message;

console.error(error);

}

}

</script>

</body>
</html>
