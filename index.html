<!DOCTYPE html>
<html>
<head>
<title>Seedream 4.0 Image to Image</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:90%;
height:80px;
padding:10px;
border-radius:6px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

img{
max-width:90%;
margin-top:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>Seedream 4.0 Image → Image Generator</h2>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<textarea id="promptInput" placeholder="Describe the change..."></textarea>

<br>

<button onclick="generateImage()">Generate Image</button>

<div id="status"></div>

<div id="output"></div>

<script src="https://js.puter.com/v2/"></script>

<script>

async function generateImage(){

const imageFile=document.getElementById("imageInput").files[0];
const prompt=document.getElementById("promptInput").value;

const status=document.getElementById("status");
const output=document.getElementById("output");

if(!imageFile){
alert("Upload an image first");
return;
}

if(!prompt){
alert("Enter a prompt");
return;
}

status.innerHTML="Generating image...";
output.innerHTML="";

const reader=new FileReader();

const imageDataUrl = await new Promise(resolve=>{
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(imageFile);
});

try{

const result = await puter.ai.txt2img(prompt,{
model:"togetherai:bytedance-seed/seedream-4.0",
input_reference:imageDataUrl,
size:"1024x1024"
});

console.log(result);

let imageData=null;

if(typeof result==="string"){
imageData=result;
}
else if(result.image){
imageData=result.image;
}
else if(result.images){
imageData=result.images[0];
}
else if(result.data && result.data[0].b64_json){
imageData="data:image/png;base64,"+result.data[0].b64_json;
}

if(!imageData){
throw new Error("No image returned");
}

const img=document.createElement("img");
img.src=imageData;

output.appendChild(img);

status.innerHTML="Image generated successfully";

}catch(error){

console.error(error);
status.innerHTML="Error: "+error.message;

}

}

</script>

</body>
</html>
